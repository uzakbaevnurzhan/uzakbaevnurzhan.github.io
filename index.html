<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="description" content="OAuth вход через Яндекс с hCaptcha и красивым интерфейсом" />
  <title>OAuth Вход</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/0f0f0f0f0f.js" crossorigin="anonymous"></script>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>

  <style>
    :root{
      --bg1:#060816;
      --bg2:#0b1020;
      --glass: rgba(10, 15, 30, 0.62);
      --glass-border: rgba(255,255,255,0.14);
      --text:#eef4ff;
      --muted:#b9c5db;
      --accent:#6e8efb;
      --accent2:#a777e3;
      --danger:#e45757;
      --success:#36c98e;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius: 22px;
    }

    @media (prefers-color-scheme: light) {
      :root{
        --bg1:#eef3ff;
        --bg2:#dfe8ff;
        --glass: rgba(255,255,255,0.72);
        --glass-border: rgba(30,40,80,0.10);
        --text:#12203a;
        --muted:#4c5a72;
        --shadow: 0 20px 50px rgba(30,40,80,0.12);
      }
    }

    *{ box-sizing:border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family:'Inter', Arial, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      background: radial-gradient(circle at top, #1a2450 0%, var(--bg2) 38%, var(--bg1) 100%);
      color:var(--text);
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(110,142,251,0.18), transparent 18%),
        radial-gradient(circle at 80% 10%, rgba(167,119,227,0.18), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(54,201,142,0.10), transparent 20%);
      pointer-events:none;
      z-index:0;
    }

    .stars {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events:none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 12px rgba(255,255,255,0.7);
      animation: drift linear infinite;
      will-change: transform;
    }

    @keyframes drift {
      0%   { transform: translate3d(0,0,0) rotate(0deg); opacity: .15; }
      50%  { opacity: .85; }
      100% { transform: translate3d(18px,-24px,0) rotate(360deg); opacity: .15; }
    }

    .page{
      position:relative;
      z-index:1;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .glass-container{
      width:min(100%, 460px);
      background: var(--glass);
      border:1px solid var(--glass-border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 22px;
      transition: transform .25s ease, backdrop-filter .25s ease, opacity .3s ease;
    }

    .glass-container:hover{
      backdrop-filter: blur(12px);
      transform: translateY(-2px);
    }

    .topline{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }

    .lang-btn, .icon-btn{
      border:0;
      background: rgba(255,255,255,0.10);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      cursor:pointer;
      transition: .2s ease;
      font-weight:700;
    }

    .lang-btn:hover, .icon-btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,0.16);
    }

    h1{
      margin: 6px 0 10px;
      font-size: 1.65rem;
      line-height:1.15;
      text-align:center;
      font-weight:800;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #7dd3fc, #a78bfa, #34d399, #7dd3fc);
      background-size: 300% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color: transparent;
      animation: textFlow 8s linear infinite;
    }

    @keyframes textFlow{
      0%{ background-position:0% 50%; }
      100%{ background-position:100% 50%; }
    }

    .subtitle{
      margin: 0 0 18px;
      text-align:center;
      color: var(--muted);
      font-size: .95rem;
      line-height:1.45;
    }

    .profile{
      display:none;
      opacity:0;
      transition: opacity .35s ease, transform .35s ease;
      transform: translateY(8px);
    }

    .profile.show{
      display:block;
      opacity:1;
      transform: translateY(0);
    }

    .avatar{
      width: 92px;
      height: 92px;
      border-radius: 50%;
      display:block;
      margin: 0 auto 14px;
      object-fit:cover;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.08), 0 0 28px rgba(110,142,251,0.35);
      animation: bounceIn .65s ease;
      background: rgba(255,255,255,0.10);
    }

    @keyframes bounceIn{
      0%{ transform: scale(.65); opacity:0; }
      60%{ transform: scale(1.08); opacity:1; }
      100%{ transform: scale(1); }
    }

    .field{
      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--text);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-size: .95rem;
      line-height:1.3;
      cursor:pointer;
      user-select:none;
    }

    .field i{
      opacity:.85;
      width:18px;
      text-align:center;
      margin-right:8px;
    }

    .field span.value{
      word-break: break-word;
      text-align:right;
      color: var(--text);
      font-weight:600;
    }

    .field small{
      color: var(--muted);
      display:block;
      margin-bottom:3px;
      font-size:.78rem;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .captcha-row, .remember-row{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      color: var(--text);
      font-size: .95rem;
    }

    .remember-row label{
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      color: var(--muted);
    }

    .remember-row input{
      width:18px;
      height:18px;
      accent-color: var(--accent);
    }

    .h-captcha {
      margin: 0 auto;
      width: fit-content;
    }

    .button{
      border:0;
      width:100%;
      padding: 13px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:white;
      font-weight:800;
      cursor:pointer;
      transition: .25s ease;
      box-shadow: 0 10px 24px rgba(110,142,251,0.28);
    }

    .button:hover{
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .button.pulse{
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{ box-shadow: 0 10px 24px rgba(110,142,251,0.28); }
      50%{ box-shadow: 0 14px 28px rgba(110,142,251,0.42); }
    }

    .button:disabled{
      background: #8b93a7;
      cursor:not-allowed;
      box-shadow:none;
      opacity:.75;
      transform:none;
      animation:none;
    }

    .secondary{
      background: rgba(255,255,255,0.10);
      box-shadow:none;
      border:1px solid rgba(255,255,255,0.10);
    }

    .secondary:hover{
      background: rgba(255,255,255,0.14);
    }

    .actions{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    .greeting{
      text-align:center;
      font-size: 1.05rem;
      font-weight:700;
      margin-bottom: 12px;
    }

    .countdown{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index: 3;
      font-size: .85rem;
      color: var(--text);
      background: rgba(0,0,0,0.26);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 8px 10px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display:none;
      max-width: calc(100vw - 28px);
    }

    #notification{
      position:fixed;
      top:14px;
      left:50%;
      transform: translateX(-50%);
      min-width: min(92vw, 420px);
      max-width: 92vw;
      z-index: 10;
      display:none;
      border-radius: 16px;
      overflow:hidden;
      box-shadow: 0 16px 40px rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.14);
      animation: slideDown .25s ease;
    }

    @keyframes slideDown{
      from{ transform: translateX(-50%) translateY(-16px); opacity:0; }
      to{ transform: translateX(-50%) translateY(0); opacity:1; }
    }

    .notif-inner{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding: 12px 14px;
      color:white;
    }

    .notif-close{
      border:0;
      background: transparent;
      color:white;
      font-size: 18px;
      cursor:pointer;
      line-height:1;
      padding:0 2px;
      opacity:.9;
    }

    .notif-close:hover{ opacity:1; }

    .hidden{
      display:none !important;
    }

    @media (max-width: 520px){
      .page{ padding: 15px; }
      .glass-container{ padding: 16px; margin: 0 15px; }
      h1{ font-size: 1.38rem; }
      .actions{ grid-template-columns:1fr; }
      .field{
        flex-direction:column;
        align-items:flex-start;
      }
      .field span.value{
        text-align:left;
        width:100%;
      }
    }

    ::-webkit-scrollbar{ width: 10px; height:10px; }
    ::-webkit-scrollbar-thumb{
      background: rgba(127,144,171,.65);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-track{ background: transparent; }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div id="notification" role="status" aria-live="polite">
    <div class="notif-inner">
      <div id="notificationText"></div>
      <button class="notif-close" id="notifClose" type="button" aria-label="Закрыть">×</button>
    </div>
  </div>

  <div class="page">
    <main class="glass-container" id="mainCard">
      <div class="topline">
        <button class="lang-btn" id="langBtn" type="button">EN</button>
        <button class="icon-btn" id="shareBtnTop" type="button" title="Поделиться">
          <i class="fa-solid fa-share-nodes"></i>
        </button>
      </div>

      <section id="loginView">
        <h1 id="title">Вход через Яндекс</h1>
        <p class="subtitle" id="subtitle">Войдите через Яндекс с hCaptcha и безопасной обработкой токена.</p>

        <form id="loginForm">
          <div class="captcha-row">
            <div
              class="h-captcha"
              data-sitekey="ES_36a5683023a44d44bfea77a2df0217d9"
              data-theme="dark"
              data-callback="onCaptchaSuccess"
              data-expired-callback="onCaptchaExpired"
              data-error-callback="onCaptchaError"
            ></div>
          </div>

          <label class="remember-row">
            <input type="checkbox" id="rememberMe">
            <span id="rememberText">Запомнить меня</span>
          </label>

          <button class="button pulse" id="loginBtn" type="button" disabled>
            <i class="fa-brands fa-yandex"></i> <span id="loginBtnText">Войти</span>
          </button>
        </form>
      </section>

      <section id="profileView" class="profile">
        <div class="greeting" id="greeting"></div>
        <img id="avatar" class="avatar" src="" alt="Аватар">
        <div class="center">
          <div class="field" id="nameField" title="Кликните, чтобы скопировать">
            <div><small>Имя</small><span id="realName" class="value">—</span></div>
            <i class="fa-regular fa-copy"></i>
          </div>

          <div class="field" id="loginField" title="Кликните, чтобы скопировать">
            <div><small>Логин</small><span id="loginName" class="value">—</span></div>
            <i class="fa-regular fa-copy"></i>
          </div>

          <div class="field" id="emailField" title="Кликните, чтобы скопировать">
            <div><small>Email</small><span id="emailName" class="value">—</span></div>
            <i class="fa-regular fa-copy"></i>
          </div>

          <div class="actions">
            <button class="button secondary" id="homeBtn" type="button">
              <i class="fa-solid fa-house"></i> <span id="homeText">Вернуться на сайт</span>
            </button>
            <button class="button" id="logoutBtn" type="button">
              <i class="fa-solid fa-right-from-bracket"></i> <span id="logoutText">Выйти</span>
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="countdown" id="countdown"></div>

  <script>
    'use strict';

    const CONFIG = {
      CLIENT_ID: 'b7d1ccff3009446f873ea72e6beaea35',
      REDIRECT_URI: 'https://uzakbaevnurzhan.github.io',
      HOME_URL: 'https://uzakbaevnurzhan.github.io',
      YANDEX_INFO_URL: 'https://login.yandex.ru/info?format=json',
      YANDEX_AUTH_URL: 'https://oauth.yandex.ru/authorize',
      STORAGE_KEY: 'yandex_auth_data',
      STATE_KEY: 'oauth_state',
      NOTIF_TIMEOUT: 3000,
      TIME_UPDATE_MS: 1000
    };

    const I18N = {
      ru: {
        title: 'Вход через Яндекс',
        subtitle: 'Войдите через Яндекс с hCaptcha и безопасной обработкой токена.',
        loginBtn: 'Войти',
        rememberMe: 'Запомнить меня',
        logout: 'Выйти',
        home: 'Вернуться на сайт',
        greetingMorning: 'Доброе утро',
        greetingDay: 'Добрый день',
        greetingEvening: 'Добрый вечер',
        greetingNight: 'Доброй ночи',
        copied: 'Скопировано!',
        needCaptcha: 'Подтвердите hCaptcha.',
        loginFailed: 'Ошибка авторизации. Войдите снова.',
        tokenInvalid: 'Ошибка токена. Войдите снова.',
        logoutMsg: 'Вы вышли из аккаунта.',
        shareNotSupported: 'Поделиться недоступно на этом устройстве.',
        sessionExpired: 'Сессия скоро истечёт',
        loginCancelled: 'Вход отменён пользователем.',
        authProcessing: 'Загрузка...'
      },
      en: {
        title: 'Login with Yandex',
        subtitle: 'Sign in with Yandex, hCaptcha, and safe token handling.',
        loginBtn: 'Sign in',
        rememberMe: 'Remember me',
        logout: 'Log out',
        home: 'Back to site',
        greetingMorning: 'Good morning',
        greetingDay: 'Good afternoon',
        greetingEvening: 'Good evening',
        greetingNight: 'Good night',
        copied: 'Copied!',
        needCaptcha: 'Please complete hCaptcha.',
        loginFailed: 'Authorization error. Please sign in again.',
        tokenInvalid: 'Token error. Please sign in again.',
        logoutMsg: 'You have signed out.',
        shareNotSupported: 'Share is not supported on this device.',
        sessionExpired: 'Session expires soon',
        loginCancelled: 'Login cancelled by user.',
        authProcessing: 'Loading...'
      }
    };

    const els = {
      stars: document.getElementById('stars'),
      notification: document.getElementById('notification'),
      notificationText: document.getElementById('notificationText'),
      notifClose: document.getElementById('notifClose'),
      loginView: document.getElementById('loginView'),
      profileView: document.getElementById('profileView'),
      loginBtn: document.getElementById('loginBtn'),
      loginBtnText: document.getElementById('loginBtnText'),
      rememberMe: document.getElementById('rememberMe'),
      title: document.getElementById('title'),
      subtitle: document.getElementById('subtitle'),
      langBtn: document.getElementById('langBtn'),
      greeting: document.getElementById('greeting'),
      avatar: document.getElementById('avatar'),
      realName: document.getElementById('realName'),
      loginName: document.getElementById('loginName'),
      emailName: document.getElementById('emailName'),
      countdown: document.getElementById('countdown'),
      homeBtn: document.getElementById('homeBtn'),
      logoutBtn: document.getElementById('logoutBtn'),
      nameField: document.getElementById('nameField'),
      loginField: document.getElementById('loginField'),
      emailField: document.getElementById('emailField'),
      shareBtnTop: document.getElementById('shareBtnTop')
    };

    let currentLocale = 'ru';
    let currentData = null;
    let countdownTimer = null;
    let notifTimer = null;

    function t(key) {
      return I18N[currentLocale][key] ?? key;
    }

    function setLocale(locale) {
      currentLocale = locale === 'en' ? 'en' : 'ru';
      els.langBtn.textContent = currentLocale === 'ru' ? 'EN' : 'RU';
      els.title.textContent = t('title');
      els.subtitle.textContent = t('subtitle');
      els.loginBtnText.textContent = t('loginBtn');
      document.getElementById('rememberText').textContent = t('rememberMe');
      els.logoutBtn.lastElementChild.textContent = t('logout');
      els.homeBtn.lastElementChild.textContent = t('home');
      renderGreetingFromTime(currentData?.real_name || currentData?.login || '');
    }

    function showNotification(message, color = 'rgba(33, 150, 243, 0.9)', timeout = CONFIG.NOTIF_TIMEOUT) {
      clearTimeout(notifTimer);
      els.notificationText.textContent = message;
      els.notification.style.backgroundColor = color;
      els.notification.style.display = 'block';
      notifTimer = setTimeout(hideNotification, timeout);
    }

    function hideNotification() {
      els.notification.style.display = 'none';
    }

    function randomState() {
      const arr = new Uint32Array(4);
      crypto.getRandomValues(arr);
      return Array.from(arr, n => n.toString(16)).join('');
    }

    function getStorage() {
      return els.rememberMe.checked ? localStorage : sessionStorage;
    }

    function saveAuthData(data) {
      const storage = getStorage();
      storage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(data));
      (storage === localStorage ? sessionStorage : localStorage).removeItem(CONFIG.STORAGE_KEY);
    }

    function loadAuthData() {
      const fromLocal = localStorage.getItem(CONFIG.STORAGE_KEY);
      if (fromLocal) return JSON.parse(fromLocal);

      const fromSession = sessionStorage.getItem(CONFIG.STORAGE_KEY);
      if (fromSession) return JSON.parse(fromSession);

      return null;
    }

    function clearAuthData() {
      localStorage.removeItem(CONFIG.STORAGE_KEY);
      sessionStorage.removeItem(CONFIG.STORAGE_KEY);
      sessionStorage.removeItem(CONFIG.STATE_KEY);
      localStorage.removeItem(CONFIG.STATE_KEY);
    }

    function cleanUrl() {
      history.replaceState({}, document.title, window.location.pathname + window.location.search);
    }

    function makeStars() {
      const count = 50;
      const frag = document.createDocumentFragment();

      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.opacity = `${Math.random() * 0.9 + 0.1}`;
        star.style.animationDuration = `${Math.random() * 14 + 6}s`;
        star.style.animationDelay = `${Math.random() * -10}s`;
        frag.appendChild(star);
      }

      els.stars.appendChild(frag);
    }

    function applyParallax(x, y) {
      const stars = document.querySelectorAll('.star');
      const dx = (x / window.innerWidth - 0.5) * 18;
      const dy = (y / window.innerHeight - 0.5) * 18;

      stars.forEach((star, index) => {
        const factor = (index % 5 + 1) / 5;
        star.style.transform = `translate3d(${dx * factor}px, ${dy * factor}px, 0)`;
      });
    }

    function formatRemaining(ms) {
      const sec = Math.max(0, Math.floor(ms / 1000));
      const h = String(Math.floor(sec / 3600)).padStart(2, '0');
      const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function updateCountdown(expiresAt) {
      clearInterval(countdownTimer);

      if (!expiresAt) {
        els.countdown.style.display = 'none';
        return;
      }

      els.countdown.style.display = 'block';

      const tick = () => {
        const remain = expiresAt - Date.now();
        if (remain <= 0) {
          els.countdown.textContent = t('sessionExpired');
          clearInterval(countdownTimer);
          return;
        }
        els.countdown.textContent = `${t('sessionExpired')}: ${formatRemaining(remain)}`;
      };

      tick();
      countdownTimer = setInterval(tick, CONFIG.TIME_UPDATE_MS);
    }

    function renderGreetingFromTime(name) {
      const hour = new Date().getHours();
      let phrase = t('greetingDay');

      if (hour >= 5 && hour < 12) phrase = t('greetingMorning');
      else if (hour >= 12 && hour < 17) phrase = t('greetingDay');
      else if (hour >= 17 && hour < 23) phrase = t('greetingEvening');
      else phrase = t('greetingNight');

      els.greeting.textContent = name ? `${phrase}, ${name}` : phrase;
    }

    function renderLoginForm() {
      els.profileView.classList.remove('show');
      els.loginView.classList.remove('hidden');
      els.loginBtn.disabled = true;
      els.loginBtn.classList.add('pulse');
      updateCountdown(null);
    }

    function renderProfile(data) {
      currentData = data;

      const avatarId = data.default_avatar_id;
      const avatarUrl = avatarId
        ? `https://avatars.yandex.net/get-yapic/${avatarId}/islands-200`
        : 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
            <rect width="200" height="200" rx="100" fill="#cbd5e1"/>
            <circle cx="100" cy="78" r="34" fill="#94a3b8"/>
            <path d="M42 180c10-34 36-52 58-52s48 18 58 52" fill="#94a3b8"/>
          </svg>`);

      els.avatar.src = avatarUrl;
      els.avatar.onerror = () => {
        els.avatar.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
            <rect width="200" height="200" rx="100" fill="#cbd5e1"/>
            <circle cx="100" cy="78" r="34" fill="#94a3b8"/>
            <path d="M42 180c10-34 36-52 58-52s48 18 58 52" fill="#94a3b8"/>
          </svg>`);
      };

      els.realName.textContent = data.real_name || '—';
      els.loginName.textContent = data.login || '—';
      els.emailName.textContent = data.default_email || '—';

      renderGreetingFromTime(data.real_name || data.login || '');

      els.loginView.classList.add('hidden');
      els.profileView.classList.add('show');
      els.loginBtn.classList.remove('pulse');

      const expiresAt = data.expires_at ? Number(data.expires_at) : null;
      updateCountdown(expiresAt);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showNotification(t('copied'), 'rgba(54, 201, 142, 0.95)');
      } catch {
        showNotification(t('loginFailed'), 'rgba(228, 87, 87, 0.92)');
      }
    }

    async function shareProfile() {
      const shareData = {
        title: CONFIG.CLIENT_ID,
        text: 'OAuth профиль',
        url: CONFIG.HOME_URL
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
        } else {
          await navigator.clipboard.writeText(CONFIG.HOME_URL);
          showNotification(t('copied'), 'rgba(54, 201, 142, 0.95)');
        }
      } catch (err) {
        console.error(err);
      }
    }

    function parseHashParams() {
      const hash = window.location.hash.replace(/^#/, '');
      return new URLSearchParams(hash);
    }

    async function fetchProfile(token) {
      const response = await fetch(CONFIG.YANDEX_INFO_URL, {
        headers: { Authorization: `OAuth ${token}` }
      });

      if (!response.ok) throw new Error('Bad response');
      return await response.json();
    }

    async function handleAuthCallback() {
      const params = parseHashParams();
      const accessToken = params.get('access_token');
      const expiresIn = Number(params.get('expires_in') || '0');
      const returnedState = params.get('state');
      const error = params.get('error');

      if (error === 'access_denied') {
        cleanUrl();
        showNotification(t('loginCancelled'), 'rgba(228, 87, 87, 0.92)');
        return;
      }

      if (accessToken) {
        const savedState = sessionStorage.getItem(CONFIG.STATE_KEY);
        if (savedState && returnedState && savedState !== returnedState) {
          cleanUrl();
          showNotification('State mismatch', 'rgba(228, 87, 87, 0.92)');
          return;
        }

        const expiresAt = expiresIn ? Date.now() + expiresIn * 1000 : null;
        saveAuthData({
          token: accessToken,
          expires_at: expiresAt,
          saved_at: Date.now(),
          remember: els.rememberMe.checked
        });

        cleanUrl();
      }

      const stored = loadAuthData();
      if (!stored?.token) {
        renderLoginForm();
        return;
      }

      showNotification(t('authProcessing'), 'rgba(110, 142, 251, 0.92)', 1200);

      try {
        const data = await fetchProfile(stored.token);
        data.expires_at = stored.expires_at;
        renderProfile(data);
      } catch (error) {
        console.group('Auth error');
        console.error(error);
        console.groupEnd();
        clearAuthData();
        renderLoginForm();
        showNotification(t('tokenInvalid'), 'rgba(228, 87, 87, 0.92)');
      }
    }

    function buildAuthUrl() {
      const state = randomState();
      sessionStorage.setItem(CONFIG.STATE_KEY, state);

      const params = new URLSearchParams({
        response_type: 'token',
        client_id: CONFIG.CLIENT_ID,
        redirect_uri: CONFIG.REDIRECT_URI,
        state
      });

      return `${CONFIG.YANDEX_AUTH_URL}?${params.toString()}`;
    }

    function loginViaService() {
      const captchaResponse = typeof hcaptcha !== 'undefined'
        ? hcaptcha.getResponse()
        : '';

      if (!captchaResponse) {
        showNotification(t('needCaptcha'), 'rgba(228, 87, 87, 0.92)');
        return;
      }

      window.location.href = buildAuthUrl();
    }

    function logout() {
      clearAuthData();
      renderLoginForm();
      showNotification(t('logoutMsg'), 'rgba(54, 201, 142, 0.95)');
      window.location.href = CONFIG.HOME_URL;
    }

    function onCaptchaSuccess() {
      els.loginBtn.disabled = false;
    }

    function onCaptchaExpired() {
      els.loginBtn.disabled = true;
    }

    function onCaptchaError() {
      els.loginBtn.disabled = true;
      showNotification('hCaptcha error', 'rgba(228, 87, 87, 0.92)');
    }

    function wireEvents() {
      els.loginBtn.addEventListener('click', loginViaService);
      els.logoutBtn.addEventListener('click', logout);
      els.homeBtn.addEventListener('click', () => window.location.href = CONFIG.HOME_URL);
      els.shareBtnTop.addEventListener('click', shareProfile);
      els.notifClose.addEventListener('click', hideNotification);

      els.nameField.addEventListener('click', () => copyText(els.realName.textContent.trim()));
      els.loginField.addEventListener('click', () => copyText(els.loginName.textContent.trim()));
      els.emailField.addEventListener('click', () => copyText(els.emailName.textContent.trim()));

      els.langBtn.addEventListener('click', () => {
        setLocale(currentLocale === 'ru' ? 'en' : 'ru');
      });

      els.rememberMe.addEventListener('change', () => {
        const data = loadAuthData();
        if (data?.token) {
          data.remember = els.rememberMe.checked;
          saveAuthData(data);
        }
      });

      window.addEventListener('mousemove', (e) => {
        applyParallax(e.clientX, e.clientY);
      });
    }

    function init() {
      makeStars();
      wireEvents();
      setLocale('ru');

      const stored = loadAuthData();
      if (stored?.remember) {
        els.rememberMe.checked = true;
      }

      handleAuthCallback();
      document.addEventListener('keyup', (e) => {
        if (e.key === 'Escape') hideNotification();
      });
    }

    window.onCaptchaSuccess = onCaptchaSuccess;
    window.onCaptchaExpired = onCaptchaExpired;
    window.onCaptchaError = onCaptchaError;

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
